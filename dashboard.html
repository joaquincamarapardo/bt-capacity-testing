<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BT Capacity — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0D1B4B;--orange:#F26522;--gray:#F4F4F6;--border:#E0E0E0;--text:#1a1a1a;--muted:#6B7280;--pale:#E8F0FB}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray);min-height:100vh}
.topbar{background:var(--navy);padding:.875rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{color:#90CAF9;text-decoration:none;font-size:13px}
.topbar-title{font-size:15px;font-weight:500;color:#fff}
.topbar-sub{font-size:11px;color:#90CAF9;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-refresh{background:var(--orange);color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer}
.last-update{font-size:11px;color:#90CAF9}

.nav{display:flex;background:#fff;border-bottom:1px solid var(--border);padding:0 1.5rem;overflow-x:auto}
.nav-tab{padding:11px 16px;font-size:13px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.nav-tab.a{color:var(--navy);border-bottom-color:var(--navy);font-weight:500}

#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--muted)}

.content{padding:1.25rem 1.5rem;max-width:1400px;margin:0 auto;display:none}
.panel{display:none}.panel.a{display:block}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1.25rem}
.card{background:#fff;border-radius:10px;padding:.875rem 1rem;border:1px solid var(--border)}
.card-acc{border-left:4px solid var(--navy)}
.card-l{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.card-v{font-size:22px;font-weight:600;color:var(--text)}
.card-s{font-size:11px;color:var(--muted);margin-top:2px}

.sec{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:1.25rem 0 .625rem;padding-bottom:5px;border-bottom:1px solid var(--border)}
.chart-card{background:#fff;border-radius:10px;padding:1.125rem;border:1px solid var(--border);margin-bottom:1rem}
.chart-card h3{font-size:13px;font-weight:500;color:var(--text);margin-bottom:.75rem}
.cw{position:relative}
.leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px;font-size:12px;color:var(--muted)}
.leg span{display:flex;align-items:center;gap:4px}
.leg i{width:10px;height:10px;border-radius:2px;display:inline-block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}

.filt{display:flex;gap:8px;margin-bottom:.875rem;flex-wrap:wrap;align-items:center}
.filt label{font-size:12px;color:var(--muted);font-weight:500}
.filt select,.filt input{font-size:12px;padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--text)}

.tw{overflow-x:auto;border:1px solid var(--border);border-radius:10px;margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--navy);color:#fff;padding:7px 9px;text-align:right;font-weight:500;white-space:nowrap}
th.l{text-align:left}
td{padding:5px 9px;border-bottom:1px solid var(--border);text-align:right;white-space:nowrap;color:var(--text)}
td.l{text-align:left}
tr:last-child td{border-bottom:none}
tr:hover td{background:#F9FAFB}
tfoot td{background:var(--navy)!important;color:#fff;font-weight:600;border-bottom:none!important}
.bon{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;background:#DBEAFE;color:#1E40AF}
.bof{display:inline-block;padding:1px 6px;border-radius:10px;font-size:10px;font-weight:500;background:#FEF3C7;color:#92400E}
.pill{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;margin:1px;font-weight:500}
.z{color:#D1D5DB}
.dp{color:#166534;font-weight:500}.dn{color:#991B1B;font-weight:500}.dz{color:#9CA3AF}

.team-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:1rem}
.team-card{background:#fff;border-radius:10px;border:1px solid var(--border);overflow:hidden}
.team-hdr{padding:.625rem 1rem;font-size:13px;font-weight:500;color:#fff}
.team-body{padding:.75rem 1rem}
.team-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;border-bottom:0.5px solid var(--border)}
.team-row:last-child{border-bottom:none}
.team-row-l{color:var(--muted)}
.team-row-v{font-weight:500}

.psel select{width:100%;font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--text);margin-bottom:1rem}
.pcard{background:#fff;border-radius:10px;border:1px solid var(--border);padding:1rem;margin-bottom:1rem}

@media(max-width:700px){.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="back-btn">← Inicio</a>
    <div>
      <div class="topbar-title">Dashboard de Capacidad 2026</div>
      <div class="topbar-sub">BT Team · DXC Technology</div>
    </div>
  </div>
  <div class="topbar-right">
    <span class="last-update" id="last-update"></span>
    <button class="btn-refresh" onclick="loadData()">↻ Actualizar</button>
  </div>
</div>

<div class="nav">
  <button class="nav-tab a" onclick="T('overview',this)">Resumen anual</button>
  <button class="nav-tab" onclick="T('bymode',this)">Onsite vs Offshore</button>
  <button class="nav-tab" onclick="T('byteam',this)">Por equipo</button>
  <button class="nav-tab" onclick="T('monthly',this)">Por mes</button>
  <button class="nav-tab" onclick="T('person',this)">Por persona</button>
  <button class="nav-tab" onclick="T('charts',this)">Gráficos</button>
  <button class="nav-tab" onclick="T('teammode',this)">Equipos On/Off</button>
</div>

<div id="loading"><div class="spinner"></div><div class="loading-txt" id="loading-txt">Conectando con Firebase...</div></div>

<div class="content" id="content">
  <div id="p-overview" class="panel a"></div>
  <div id="p-bymode"   class="panel"></div>
  <div id="p-byteam"  class="panel"></div>
  <div id="p-monthly" class="panel"></div>
  <div id="p-person"  class="panel"></div>
  <div id="p-charts"  class="panel"></div>
  <div id="p-teammode" class="panel"></div>
</div>

<script type="module">
import { auth, db, onAuthStateChanged, collection, getDocs }
  from './firebase-config.js';

// ── CONSTANTES ─────────────────────────────────────────────────────────────
const MN   = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MNL  = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DAYS = [31,28,31,30,31,30,31,31,30,31,30,31];
const YEAR = 2026;
const CODES  = ['H','L','S','T','M','COM','LD','HPY','EXT','F'];
const CNAMES = {H:'Holiday',L:'License',S:'Sickness',T:'Training',M:'Maternity leave',COM:'Compensated',LD:'Libre disp.',HPY:'Holiday prev. year',EXT:'Extra hours',F:'Festivity'};
const CCOLS  = {H:'#FFD700',L:'#90CAF9',S:'#FFCDD2',T:'#B2EBF2',M:'#FCE4EC',COM:'#A5D6A7',LD:'#E8F5E9',HPY:'#B3E5FC',EXT:'#FFCC80',F:'#FFAB91'};
const TCOLORS = ['#0D1B4B','#F26522','#1D9E75','#D85A30','#7F77DD','#BA7517','#D4537E','#378ADD','#639922','#888780'];

const CHS = {};
let STATE = { roster: [], people: [], annual: [], teamData: {}, teams: [] };

// ── AUTH ───────────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if(!user) { window.location = 'index.html'; return; }

  // Solo admins pueden acceder al dashboard
  const { doc: docFn, getDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const userId = user.email.replace(/[@.]/g, '_');
  const userSnap = await getDoc(docFn(db, 'users', userId));
  const role = userSnap.exists() ? userSnap.data().role : 'user';

  // Guardar rol y email para uso posterior
  window._userRole  = role;
  window._userEmail = user.email;

  if(role !== 'admin') {
    // Users solo ven "Por persona" — ocultar todas las pestañas excepto esa
    document.querySelectorAll('.nav-tab').forEach(btn => {
      if(!btn.textContent.includes('Por persona')) btn.style.display = 'none';
    });
    // Activar directamente la pestaña Por persona
    document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('a'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('a'));
    const personTab = document.querySelector('.nav-tab');
    if(personTab) personTab.classList.add('a');
    document.getElementById('p-person').classList.add('a');
  }

  loadData();
});

// ── CARGA DE DATOS ─────────────────────────────────────────────────────────
window.loadData = async () => {
  showLoading('Cargando roster...');
  try {
    // Roster
    const rosterSnap = await getDocs(collection(db, 'roster'));
    const roster = [];
    rosterSnap.forEach(d => roster.push({ id: d.id, ...d.data() }));

    setLoadingTxt('Cargando calendarios...');
    // Calendar
    const calSnap = await getDocs(collection(db, 'calendar'));
    const calMap  = {};
    calSnap.forEach(d => { calMap[d.id] = d.data(); });

    setLoadingTxt('Calculando métricas...');
    STATE = processData(roster, calMap);
    hideLoading();

    document.getElementById('last-update').textContent =
      '↻ ' + new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

    renderAll();
  } catch(e) {
    hideLoading();
    alert('Error al cargar datos: ' + e.message);
  }
};

// ── PROCESADO ──────────────────────────────────────────────────────────────
function processData(roster, calMap) {
  const people  = {};
  const annual  = [];
  const teamData= {};

  for(let mi = 0; mi < 12; mi++) {
    const mk    = MN[mi];
    const nDays = DAYS[mi];
    const fw    = (new Date(YEAR, mi, 1).getDay() + 6) % 7;
    let totAvail=0,totAbs=0,onAvail=0,offAvail=0,onAbs=0,offAbs=0,onHC=0,offHC=0;
    const absType = {};

    // Filtrar entradas de este mes
    const monthEntries = Object.entries(calMap).filter(([k]) => k.startsWith(mk+'-'));

    monthEntries.forEach(([key, data]) => {
      const name  = data.name;
      const team  = data.team || 'BT';
      const rp    = roster.find(r => r.name === name);
      const mode  = rp ? rp.mode : '?';
      const hd    = rp ? (rp.hrs?.[mi] || 8) : 8;

      if(!people[name]) people[name] = { mode, team, hrs: rp?.hrs||[], months:{}, codes:{} };

      let avail=0, absHrs=0;
      const dayCodes = {};

      for(let d = 1; d <= nDays; d++) {
        const wd = (fw + d - 1) % 7;
        if(wd >= 5) continue;
        const v = data.days?.[String(d)];
        if(v && typeof v === 'object' && v.type === 'EXT') {
          // Día EXT: horas extra, suman al disponible, se contabilizan
          avail += v.hours || hd;
          dayCodes['EXT'] = (dayCodes['EXT']||0) + 1;
        } else if(typeof v === 'string' && CODES.includes(v)) {
          dayCodes[v] = (dayCodes[v]||0) + 1;
          absHrs += hd;
          absType[v] = (absType[v]||0) + hd;
        } else if(typeof v === 'number' && v > 0) {
          // Detectar EXT también si las horas son mayores al estándar
          avail += v;
          if(v > hd) dayCodes['EXT'] = (dayCodes['EXT']||0) + 1;
        } else if(v === undefined) {
          // día activo sin dato → usar horas por defecto
          const pStart = rp ? new Date(rp.start) : new Date(2026,0,1);
          const pEnd   = rp?.end ? new Date(rp.end) : null;
          const dd     = new Date(YEAR, mi, d);
          if(dd >= pStart && (!pEnd || dd <= pEnd)) avail += hd;
        }
      }

      people[name].months[mk] = { avail, abs: absHrs, codes: dayCodes };
      Object.entries(dayCodes).forEach(([c,n]) => {
        people[name].codes[c] = (people[name].codes[c]||0) + n;
      });

      totAvail += avail; totAbs += absHrs;
      if(mode==='Onsite') { onAvail+=avail; onAbs+=absHrs; onHC++; }
      else if(mode==='Offshore') { offAvail+=avail; offAbs+=absHrs; offHC++; }

      // Por equipo
      if(!teamData[team]) teamData[team] = {};
      if(!teamData[team][mk]) teamData[team][mk] = { avail:0, abs:0, count:0, people:[] };
      teamData[team][mk].avail += avail;
      teamData[team][mk].abs   += absHrs;
      teamData[team][mk].count++;
      teamData[team][mk].people.push({ name, mode, avail, abs: absHrs, codes: dayCodes });
    });

    annual.push({ month:mk, total_hrs:totAvail, abs_hrs:totAbs,
      on_avail:onAvail, off_avail:offAvail, on_abs:onAbs, off_abs:offAbs,
      on_hc:onHC, off_hc:offHC, abs_by_type:absType });
  }

  const peopleList = Object.entries(people).map(([name, p]) => ({
    name, mode:p.mode, team:p.team,
    avail: Object.values(p.months).reduce((s,m)=>s+(m.avail||0),0),
    abs:   Object.values(p.months).reduce((s,m)=>s+(m.abs||0),0),
    codes: p.codes, months: p.months
  })).sort((a,b)=>a.name.localeCompare(b.name));

  const teams = Object.keys(teamData).sort();
  const tColors = {};
  teams.forEach((t,i) => tColors[t] = TCOLORS[i % TCOLORS.length]);

  return { roster, people: peopleList, annual, teamData, teams, tColors };
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function pct(a,b){ return b>0?Math.round(a/b*100):0; }
function fmt(n){ return n>=1000?(n/1000).toFixed(1)+'k':String(Math.round(n||0)); }
function delt(v){ return v>0?`<span class="dp">▲${fmt(v)}</span>`:v<0?`<span class="dn">▼${fmt(Math.abs(v))}</span>`:`<span class="dz">—</span>`; }
function pill(codes,c){ const n=codes[c]||0; return n?`<td><span class="pill" style="background:${CCOLS[c]}">${n}</span></td>`:`<td class="z">—</td>`; }
function bdg(m){ return m==='Onsite'?`<span class="bon">Onsite</span>`:`<span class="bof">Offshore</span>`; }
function card(l,v,s,acc){ return `<div class="card${acc?' card-acc':''}"><div class="card-l">${l}</div><div class="card-v">${v}</div><div class="card-s">${s}</div></div>`; }
function mkC(id,type,data,opts){
  const ctx=document.getElementById(id); if(!ctx) return;
  if(CHS[id]) CHS[id].destroy();
  CHS[id]=new Chart(ctx,{type,data,options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},...opts}});
}

function renderAll(){ renderOverview(); renderByMode(); renderByTeam(); renderMonthly(); renderPerson(); renderCharts(); }

// ── OVERVIEW ───────────────────────────────────────────────────────────────
function renderOverview(){
  const d=STATE; if(!d.annual.length) return;
  const totA=d.annual.reduce((s,a)=>s+a.total_hrs,0);
  const totB=d.annual.reduce((s,a)=>s+a.abs_hrs,0);
  const maxM=d.annual.reduce((a,b)=>a.total_hrs>b.total_hrs?a:b);
  const maxAM=d.annual.reduce((a,b)=>a.abs_hrs>b.abs_hrs?a:b);
  const nOn=d.people.filter(p=>p.mode==='Onsite').length;
  const nOff=d.people.filter(p=>p.mode==='Offshore').length;

  let html=`<div class="cards">
    ${card('Total horas 2026',fmt(totA)+'h',`${totA.toLocaleString()} h disponibles`,true)}
    ${card('Total ausencias',fmt(totB)+'h',`${pct(totB,totA+totB)}% sobre capacidad bruta`)}
    ${card('Personas activas',d.people.length,`${nOn} Onsite · ${nOff} Offshore`)}
    ${card('Mes más productivo',maxM.month,`${maxM.total_hrs.toLocaleString()} h`)}
    ${card('Mes más ausencias',maxAM.month,`${maxAM.abs_hrs.toLocaleString()} h ausencia`)}
  </div>
  <div class="grid2">
    <div class="chart-card"><h3>Horas disponibles vs ausencias por mes</h3>
      <div class="leg"><span><i style="background:#0D1B4B"></i>Disponibles</span><span><i style="background:#F26522"></i>Ausencia</span></div>
      <div class="cw" style="height:200px"><canvas id="ch-ov1"></canvas></div>
    </div>
    <div class="chart-card"><h3>Headcount por mes</h3>
      <div class="leg"><span><i style="background:#0D1B4B"></i>Onsite</span><span><i style="background:#F26522"></i>Offshore</span></div>
      <div class="cw" style="height:200px"><canvas id="ch-ov2"></canvas></div>
    </div>
  </div>
  <div class="sec">Tabla por persona</div>
  <div class="filt">
    <label>Modo:</label><select id="fov-mode" onchange="filterOvTable()"><option value="">Todos</option><option>Onsite</option><option>Offshore</option></select>
    <label>Buscar:</label><input id="fov-name" placeholder="Nombre..." oninput="filterOvTable()" style="width:160px">
  </div>`;
  html+=`<div class="tw"><table><thead><tr>
    <th class="l" style="min-width:150px">Persona</th><th class="l">Modo</th><th class="l">Equipo</th>
    <th>H disp.</th><th>H aus.</th><th>% disp.</th>
    ${CODES.map(c=>`<th>${c}</th>`).join('')}
  </tr></thead><tbody id="tbody-ov"></tbody></table></div>`;

  document.getElementById('p-overview').innerHTML=html;
  setTimeout(()=>{
    mkC('ch-ov1','bar',{labels:MNL,datasets:[
      {label:'Disp.',data:d.annual.map(a=>a.total_hrs),backgroundColor:'#0D1B4B'},
      {label:'Aus.',data:d.annual.map(a=>a.abs_hrs),backgroundColor:'#F26522'}
    ]},{scales:{x:{ticks:{autoSkip:false,font:{size:10}}},y:{ticks:{callback:v=>fmt(v)}}}});
    mkC('ch-ov2','line',{labels:MNL,datasets:[
      {label:'On',data:d.annual.map(a=>a.on_hc),borderColor:'#0D1B4B',backgroundColor:'#0D1B4B',tension:.3,pointRadius:4},
      {label:'Off',data:d.annual.map(a=>a.off_hc),borderColor:'#F26522',backgroundColor:'#F26522',tension:.3,pointRadius:4,borderDash:[4,2]}
    ]},{scales:{x:{ticks:{autoSkip:false,font:{size:10}}},y:{min:0}}});
    filterOvTable();
  },50);
}

window.filterOvTable=()=>{
  const mode=document.getElementById('fov-mode')?.value||'';
  const name=(document.getElementById('fov-name')?.value||'').toLowerCase();
  const f=STATE.people.filter(p=>(!mode||p.mode===mode)&&(!name||p.name.toLowerCase().includes(name))).sort((a,b)=>b.avail-a.avail);
  const el=document.getElementById('tbody-ov'); if(!el) return;
  el.innerHTML=f.map(p=>{
    const t=p.avail+p.abs||1;
    return `<tr><td class="l">${p.name}</td><td class="l">${bdg(p.mode)}</td><td class="l">${p.team}</td>
      <td>${p.avail.toLocaleString()}</td><td>${p.abs.toLocaleString()}</td><td>${pct(p.avail,t)}%</td>
      ${CODES.map(c=>pill(p.codes,c)).join('')}</tr>`;
  }).join('');
};

// ── BY MODE ────────────────────────────────────────────────────────────────
function renderByMode(){
  const d=STATE; if(!d.annual.length) return;
  const onA=d.annual.map(a=>a.on_avail), offA=d.annual.map(a=>a.off_avail);
  const onAb=d.annual.map(a=>a.on_abs), offAb=d.annual.map(a=>a.off_abs);
  const totOn=onA.reduce((s,v)=>s+v,0), totOff=offA.reduce((s,v)=>s+v,0);
  const totOnB=onAb.reduce((s,v)=>s+v,0), totOffB=offAb.reduce((s,v)=>s+v,0);

  let html=`<div class="cards">
    ${card('Horas Onsite',fmt(totOn)+'h',`${pct(totOn,totOn+totOnB)}% disponibilidad`,true)}
    ${card('Horas Offshore',fmt(totOff)+'h',`${pct(totOff,totOff+totOffB)}% disponibilidad`)}
    ${card('Tasa aus. Onsite',pct(totOnB,totOn+totOnB)+'%',`${totOnB.toLocaleString()} h ausencia`)}
    ${card('Tasa aus. Offshore',pct(totOffB,totOff+totOffB)+'%',`${totOffB.toLocaleString()} h ausencia`)}
  </div>
  <div class="grid2">
    <div class="chart-card"><h3>Horas disponibles — Onsite vs Offshore</h3>
      <div class="leg"><span><i style="background:#0D1B4B"></i>Onsite</span><span><i style="background:#F26522"></i>Offshore</span></div>
      <div class="cw" style="height:200px"><canvas id="ch-bm1"></canvas></div>
    </div>
    <div class="chart-card"><h3>Tasa de ausencias %</h3>
      <div class="leg"><span><i style="background:#0D1B4B"></i>% Onsite</span><span><i style="background:#F26522"></i>% Offshore</span></div>
      <div class="cw" style="height:200px"><canvas id="ch-bm2"></canvas></div>
    </div>
  </div>
  <div class="sec">Tabla mensual Onsite vs Offshore</div>`;

  let rows='',soa=0,sob=0,sfa=0,sfb=0;
  MN.forEach((mk,i)=>{

  const teamAbs  =t=>MN.reduce((s,mk)=>s+(d.teamData[t]?.[mk]?.abs||0),0);

      <div class="tw"><table><thead><tr><th class="l">Equipo</th><th>H disponibles</th><th>H ausencia</th><th>% disp.</th><th>Personas</th><th>Media h/p</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td class="l">TOTAL</td><td>${sumA.toLocaleString()}</td><td>${sumB.toLocaleString()}</td><td>${pct(sumA,sumA+sumB)}%</td><td>—</td><td>—</td></tr></tfoot>

  } else {

    const mk=MN[mi];
    const active=sorted.filter(t=>d.teamData[t]?.[mk]);
    let rows='',totA=0,totB=0;
    active.forEach(t=>{
      const td=d.teamData[t][mk]; totA+=td.avail;totB+=td.abs;
      rows+=`<tr><td class="l"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${d.tColors[t]};margin-right:6px;vertical-align:middle"></span>${t}</td>
        <td>${td.avail.toLocaleString()}</td><td>${td.abs.toLocaleString()}</td><td>${pct(td.avail,td.avail+td.abs)}%</td><td>${td.count}</td><td>${td.count?Math.round(td.avail/td.count):0}</td></tr>`;
    });
    let pRows='';
    active.forEach(t=>{
      d.teamData[t][mk].people.sort((a,b)=>b.avail-a.avail).forEach(p=>{
        pRows+=`<tr><td class="l"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${d.tColors[t]};margin-right:4px;vertical-align:middle"></span>${t}</td>
          <td class="l">${p.name}</td><td class="l">${bdg(p.mode)}</td>
          <td>${p.avail}</td><td>${p.abs}</td><td>${pct(p.avail,p.avail+p.abs||1)}%</td></tr>`;
      });
    });
    con.innerHTML=`<div class="chart-card"><h3>Horas por equipo — ${MNL[mi]}</h3>
      <div class="cw" style="height:200px"><canvas id="ch-bt2"></canvas></div></div>
      <div class="tw"><table><thead><tr><th class="l">Equipo</th><th>H disponibles</th><th>H ausencia</th><th>% disp.</th><th>Personas</th><th>Media h/p</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td class="l">TOTAL</td><td>${totA.toLocaleString()}</td><td>${totB.toLocaleString()}</td><td>${pct(totA,totA+totB)}%</td><td>—</td><td>—</td></tr></tfoot>
      </table></div>
      <div class="sec">Personas por equipo — ${MNL[mi]}</div>
      <div class="tw"><table><thead><tr><th class="l">Equipo</th><th class="l">Persona</th><th class="l">Modo</th><th>H disp.</th><th>H aus.</th><th>% disp.</th></tr></thead>
      <tbody>${pRows}</tbody></table></div>`;
    setTimeout(()=>mkC('ch-bt2','bar',{labels:active,datasets:[
      {label:'Disp.',data:active.map(t=>d.teamData[t][mk].avail),backgroundColor:active.map(t=>d.tColors[t])},
      {label:'Aus.',data:active.map(t=>d.teamData[t][mk].abs),backgroundColor:active.map(t=>d.tColors[t]+'88')}

  }
};

window.filterMonthly=()=>{
  const mi=parseInt(document.getElementById('fm-mes')?.value||0);
  const mk=MN[mi];
  const mode=document.getElementById('fm-mode')?.value||'';
  const name=(document.getElementById('fm-name')?.value||'').toLowerCase();
  const f=STATE.people
    .filter(p=>(!mode||p.mode===mode)&&(!name||p.name.toLowerCase().includes(name))&&p.months[mk])
    .map(p=>({...p,m:p.months[mk]}))
    .sort((a,b)=>(b.m.avail||0)-(a.m.avail||0));
  const ta=f.reduce((s,p)=>s+(p.m.avail||0),0);
  const tb=f.reduce((s,p)=>s+(p.m.abs||0),0);
  const cm=document.getElementById('c-monthly');
  if(cm) cm.innerHTML=
    card('Personas activas',f.length,`${f.filter(p=>p.mode==='Onsite').length} on · ${f.filter(p=>p.mode==='Offshore').length} off`,true)+
    card('H disponibles',ta.toLocaleString(),`en ${MNL[mi]}`)+
    card('H ausencia',tb.toLocaleString(),`${pct(tb,ta+tb)}% del total`)+
    card('Media h/persona',f.length?Math.round(ta/f.length):0,'h disponibles');
  const tbody=document.getElementById('tbody-monthly');
  if(tbody) tbody.innerHTML=f.map(p=>{
    const t=(p.m.avail||0)+(p.m.abs||0)||1;
    return `<tr><td class="l">${p.name}</td><td class="l">${bdg(p.mode)}</td><td class="l">${p.team}</td>
      <td>${p.m.avail||0}</td><td>${p.m.abs||0}</td><td>${pct(p.m.avail||0,t)}%</td>
      ${CODES.map(c=>pill(p.m.codes||{},c)).join('')}</tr>`;
  }).join('');
};

// ── PERSON ─────────────────────────────────────────────────────────────────
function renderPerson(){
  const isAdmin = window._userRole === 'admin';
  const userEmail = window._userEmail || '';

  if(!isAdmin) {
    // Usuario normal: mostrar solo su propia ficha sin selector
    // Buscar su persona por email en el roster
    const myPerson = STATE.people.find(p => {
      const r = STATE.roster.find(r => r.name === p.name);
      return r && r.email && r.email.toLowerCase() === userEmail.toLowerCase();
    });

    document.getElementById('p-person').innerHTML = `<div id="person-content"></div>`;

    if(!myPerson) {
      document.getElementById('person-content').innerHTML = `
        <div style="text-align:center;padding:3rem;color:var(--muted);font-size:13px">
          <div style="font-size:32px;margin-bottom:1rem">👤</div>
          No se encontraron datos para tu cuenta.<br>Contacta con el administrador.
        </div>`;
      return;
    }
    renderPersonCard(myPerson);
    return;
  }

  // Admin: selector completo
  const opts=STATE.people.map(p=>`<option value="${p.name}">${p.name} (${p.mode})</option>`).join('');
  document.getElementById('p-person').innerHTML=`
    <div class="psel"><select id="fp-sel" onchange="filterPerson()">${opts}</select></div>
    <div id="person-content"></div>`;
  filterPerson();
}

function renderPersonCard(p) {
  const t=p.avail+p.abs||1;
  const cpills=Object.entries(p.codes).map(([c,n])=>
    `<span class="pill" style="background:${CCOLS[c]||'#eee'};padding:3px 9px;font-size:12px">${CNAMES[c]||c}: ${n} días</span>`
  ).join(' ');
  const rows=MN.map((mk,i)=>{
    const m=p.months[mk]||{};const a=m.avail||0,b=m.abs||0;
    if(!a&&!b) return `<tr><td>${MNL[i]}</td><td colspan="${3+CODES.length}" class="z" style="text-align:center">— inactivo —</td></tr>`;
    return `<tr><td>${MNL[i]}</td><td>${a}</td><td>${b}</td><td>${pct(a,a+b||1)}%</td>${CODES.map(c=>pill(m.codes||{},c)).join('')}</tr>`;
  }).join('');
  document.getElementById('person-content').innerHTML=`
    <div class="pcard">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:.75rem">
        <div style="width:42px;height:42px;border-radius:50%;background:#E8F0FB;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#0C447C;flex-shrink:0">${p.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
        <div><div style="font-size:15px;font-weight:500">${p.name}</div>
          <div style="margin-top:3px;display:flex;gap:6px;align-items:center">${bdg(p.mode)}<span style="font-size:11px;color:var(--muted)">${p.team}</span></div>
        </div>
        <div style="margin-left:auto;text-align:right">
          <div style="font-size:22px;font-weight:600">${p.avail.toLocaleString()} h</div>
          <div style="font-size:11px;color:var(--muted)">${pct(p.avail,t)}% disponible · ${p.abs.toLocaleString()} h ausencia</div>
        </div>
      </div>
      ${cpills?`<div style="display:flex;flex-wrap:wrap;gap:5px">${cpills}</div>`:''}
    </div>
    <div class="tw"><table>
      <thead><tr><th class="l">Mes</th><th>H disp.</th><th>H aus.</th><th>% disp.</th>${CODES.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td class="l">TOTAL AÑO</td><td>${p.avail.toLocaleString()}</td><td>${p.abs.toLocaleString()}</td><td>${pct(p.avail,t)}%</td>
        ${CODES.map(c=>`<td>${p.codes[c]||'—'}</td>`).join('')}</tr></tfoot>
    </table></div>`;
}

window.filterPerson=()=>{
  const nm=document.getElementById('fp-sel')?.value;
  const p=STATE.people.find(x=>x.name===nm); if(!p) return;
  renderPersonCard(p);
};

// ── EQUIPOS ON/OFF ─────────────────────────────────────────────────────────
function renderTeamMode(){
  const d = STATE;
  if(!d.teams.length) return;

  const sorted = [...d.teams].sort((a,b)=>{
    const aA = MN.reduce((s,mk)=>s+(d.teamData[a]?.[mk]?.avail||0),0);
    const bA = MN.reduce((s,mk)=>s+(d.teamData[b]?.[mk]?.avail||0),0);
    return bA-aA;
  });

  // Horas disponibles onsite/offshore por equipo (anual)
  const teamStats = sorted.map(team => {
    let onAvail=0, offAvail=0;
    MN.forEach(mk => {
      (d.teamData[team]?.[mk]?.people||[]).forEach(p => {
        if(p.mode==='Onsite') onAvail+=p.avail;
        else offAvail+=p.avail;
      });
    });
    return { team, onAvail, offAvail };
  }).filter(t => t.onAvail>0 || t.offAvail>0);

  // Tabla resumen
  const rows = teamStats.map(t=>`<tr>
    <td class="l"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${d.tColors[t.team]};margin-right:6px;vertical-align:middle"></span>${t.team}</td>
    <td>${t.onAvail.toLocaleString()}</td>
    <td>${t.offAvail.toLocaleString()}</td>
    <td>${(t.onAvail+t.offAvail).toLocaleString()}</td>
    <td>${t.onAvail+t.offAvail>0?Math.round(t.onAvail/(t.onAvail+t.offAvail)*100)+'%':'—'}</td>
    <td>${t.onAvail+t.offAvail>0?Math.round(t.offAvail/(t.onAvail+t.offAvail)*100)+'%':'—'}</td>
  </tr>`).join('');

  let html = `
    <div class="sec">Horas disponibles Onsite vs Offshore por equipo — 2026</div>
    <div class="chart-card">
      <h3>Comparativa anual — Onsite vs Offshore por equipo</h3>
      <div class="leg"><span><i style="background:#0D1B4B"></i>Onsite</span><span><i style="background:#F26522"></i>Offshore</span></div>
      <div class="cw" style="height:260px"><canvas id="ch-tm1"></canvas></div>
    </div>
    <div class="sec">Tabla resumen anual</div>
    <div class="tw"><table><thead><tr>
      <th class="l">Equipo</th>
      <th>H Onsite</th><th>H Offshore</th><th>Total</th>
      <th>% Onsite</th><th>% Offshore</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
    <div class="sec">Evolución mensual Onsite vs Offshore</div>
    <div class="filt">
      <label>Equipo:</label>
      <select id="ftm-eq" onchange="renderTeamModeMonth()" style="font-size:12px;padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:#fff">
        ${sorted.map(t=>`<option value="${t}">${t}</option>`).join('')}
      </select>
    </div>
    <div class="chart-card">
      <h3 id="ch-tm2-title">Evolución mensual</h3>
      <div class="leg"><span><i style="background:#0D1B4B"></i>Onsite</span><span><i style="background:#F26522"></i>Offshore</span></div>
      <div class="cw" style="height:220px"><canvas id="ch-tm2"></canvas></div>
    </div>
    <div class="sec">Comparativa entre equipos — evolución mensual</div>
    <div class="filt">
      <label>Ver:</label>
      <select id="ftm-view" onchange="renderTeamModeEvolution()" style="font-size:12px;padding:5px 9px;border-radius:7px;border:1px solid var(--border);background:#fff">
        <option value="ratio">% Offshore sobre total (ratio)</option>
        <option value="offshore">Horas Offshore absolutas</option>
        <option value="onsite">Horas Onsite absolutas</option>
        <option value="total">Horas totales</option>
      </select>
    </div>
    <div class="chart-card">
      <h3 id="ch-tm3-title">% horas Offshore sobre total — por equipo y mes</h3>
      <div class="leg" id="ch-tm3-leg"></div>
      <div class="cw" style="height:280px"><canvas id="ch-tm3"></canvas></div>
    </div>`;

  document.getElementById('p-teammode').innerHTML = html;

  setTimeout(() => {
    // Comparativa agrupada anual
    mkC('ch-tm1','bar',{labels:teamStats.map(t=>t.team),datasets:[
      {label:'Onsite', data:teamStats.map(t=>t.onAvail),  backgroundColor:'#0D1B4B'},
      {label:'Offshore',data:teamStats.map(t=>t.offAvail),backgroundColor:'#F26522'}
    ]},{plugins:{legend:{display:false}},
       scales:{x:{ticks:{autoSkip:false,font:{size:11}}},y:{ticks:{callback:v=>fmt(v)}}}});

    renderTeamModeMonth();
    renderTeamModeEvolution();
  }, 50);
}

window.renderTeamModeEvolution = () => {
  const d = STATE;
  const view = document.getElementById('ftm-view')?.value || 'ratio';
  const titles = {
    ratio:   '% horas Offshore sobre total — por equipo y mes',
    offshore:'Horas Offshore disponibles — evolución por equipo',
    onsite:  'Horas Onsite disponibles — evolución por equipo',
    total:   'Horas totales disponibles — evolución por equipo'
  };
  const titleEl = document.getElementById('ch-tm3-title');
  if(titleEl) titleEl.textContent = titles[view];

  // Calcular datos por equipo y mes
  const teamsWithData = d.teams.filter(team =>
    MN.some(mk => (d.teamData[team]?.[mk]?.avail||0) > 0)
  ).sort((a,b) => {
    const aA = MN.reduce((s,mk)=>s+(d.teamData[a]?.[mk]?.avail||0),0);
    const bA = MN.reduce((s,mk)=>s+(d.teamData[b]?.[mk]?.avail||0),0);
    return bA-aA;
  });

  // Actualizar leyenda
  const legEl = document.getElementById('ch-tm3-leg');
  if(legEl) legEl.innerHTML = teamsWithData.map(t=>
    `<span><i style="background:${d.tColors[t]};width:12px;height:3px;border-radius:2px;display:inline-block"></i>${t}</span>`
  ).join('');

  const datasets = teamsWithData.map(team => {
    const data = MN.map(mk => {
      const people = d.teamData[team]?.[mk]?.people || [];
      const onAvail  = people.filter(p=>p.mode==='Onsite').reduce((s,p)=>s+p.avail,0);
      const offAvail = people.filter(p=>p.mode==='Offshore').reduce((s,p)=>s+p.avail,0);
      const total    = onAvail + offAvail;
      if(view==='ratio')    return total>0 ? Math.round(offAvail/total*100) : null;
      if(view==='offshore') return offAvail || null;
      if(view==='onsite')   return onAvail  || null;
      return total || null;
    });
    return {
      label: team,
      data,
      borderColor: d.tColors[team],
      backgroundColor: d.tColors[team],
      tension: .35,
      pointRadius: 4,
      pointHoverRadius: 6,
      borderWidth: 2.5,
      fill: false,
      spanGaps: true
    };
  });

  const yOpts = view==='ratio'
    ? { min:0, max:100, ticks:{ callback: v=>v+'%' } }
    : { ticks:{ callback: v=>fmt(v) } };

  mkC('ch-tm3','line',{labels:MNL,datasets},{
    plugins:{
      legend:{ display:true, position:'bottom', labels:{ boxWidth:12, font:{size:11} } },
      tooltip:{
        callbacks:{
          label: ctx => {
            const v = ctx.parsed.y;
            return v===null ? null :
              view==='ratio' ? `${ctx.dataset.label}: ${v}% offshore` :
              `${ctx.dataset.label}: ${v.toLocaleString()} h`;
          }
        }
      }
    },
    scales:{
      x:{ ticks:{ autoSkip:false, font:{size:10} } },
      y: yOpts
    }
  });
};

window.renderTeamModeMonth = () => {
  const d = STATE;
  const team = document.getElementById('ftm-eq')?.value;
  if(!team || !d.teamData[team]) return;

  const onData  = MN.map(mk=>(d.teamData[team]?.[mk]?.people||[]).filter(p=>p.mode==='Onsite').reduce((s,p)=>s+p.avail,0));
  const offData = MN.map(mk=>(d.teamData[team]?.[mk]?.people||[]).filter(p=>p.mode==='Offshore').reduce((s,p)=>s+p.avail,0));

  document.getElementById('ch-tm2-title').textContent = `${team} — Onsite vs Offshore por mes`;

  mkC('ch-tm2','bar',{labels:MNL,datasets:[
    {label:'Onsite', data:onData,  backgroundColor:'#0D1B4B'},
    {label:'Offshore',data:offData,backgroundColor:'#F26522'}
  ]},{plugins:{legend:{display:true,position:'top',labels:{boxWidth:10,font:{size:11}}}},
     scales:{x:{ticks:{autoSkip:false,font:{size:10}}},y:{ticks:{callback:v=>fmt(v)}}}});
};

// ── UI ─────────────────────────────────────────────────────────────────────
window.T=(id,btn)=>{
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('a'));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('a'));
  document.getElementById('p-'+id).classList.add('a'); btn.classList.add('a');
  if(id==='teammode') renderTeamMode();
};
function showLoading(msg){ document.getElementById('loading').style.display='flex'; document.getElementById('content').style.display='none'; document.getElementById('loading-txt').textContent=msg||'Cargando...'; }
function hideLoading(){ document.getElementById('loading').style.display='none'; document.getElementById('content').style.display='block'; }
function setLoadingTxt(t){ document.getElementById('loading-txt').textContent=t; }
</script>
